<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abonnement expiré — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <div class="onboarding-screen">

      <div class="onboarding-content">
        <div class="blocking-icon blocking-icon--warning">
          <i class="fa-solid fa-crown"></i>
          <div class="blocking-icon-badge">
            <i class="fa-solid fa-exclamation"></i>
          </div>
        </div>
        <h1 class="onboarding-title">Abonnement expiré</h1>
        <p class="onboarding-subtitle">
          Votre abonnement a expiré le 15 mars 2026.
          L'accès au catalogue et à vos contenus téléchargés
          est suspendu jusqu'au renouvellement.
        </p>

        <div class="blocking-info-box">
          <p class="blocking-info-text">
            Pour renouveler, rendez-vous sur
          </p>
          <p class="blocking-info-url">nooba.ma/mon-compte</p>
        </div>
      </div>

      <div class="onboarding-footer">
        <a href="13_login.html" class="onboarding-skip" style="text-decoration: none; display: block;">Se connecter avec un autre compte</a>
      </div>

    </div>
  </div>

</body>
</html>
