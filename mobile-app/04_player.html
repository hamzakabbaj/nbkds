<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecteur Audio — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="status-bar-time">9:45</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-three-quarters"></i>
      </div>
    </div>

    <!-- Player Screen -->
    <div class="player-screen">

      <!-- Header — chevron down ferme le player, retour à Home -->
      <div class="player-header">
        <a href="02_home.html" class="player-header-btn">
          <i class="fa-solid fa-chevron-down"></i>
        </a>
        <span class="player-header-label">Récits & Contes</span>
        <button class="player-header-btn">
          <i class="fa-solid fa-ellipsis"></i>
        </button>
      </div>

      <!-- Cover Art -->
      <div class="player-cover">
        <div class="player-cover-art player-cover-art--recits">
          <i class="fa-solid fa-book-open"></i>
        </div>
      </div>

      <!-- Info -->
      <div class="player-info">
        <h1 class="player-info-title">Hmadou et Hmaydou</h1>
        <p class="player-info-meta">Darija / Français · 3-5 ans</p>
      </div>

      <!-- Progress -->
      <div class="player-progress">
        <div class="player-progress-bar">
          <div class="player-progress-fill" style="width: 42%;"></div>
        </div>
        <div class="player-progress-times">
          <span>3:22</span>
          <span>8:00</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="player-controls">
        <button class="player-controls-skip">
          <i class="fa-solid fa-backward"></i>
        </button>
        <button class="player-controls-play">
          <i class="fa-solid fa-pause" style="margin-left: 0;"></i>
        </button>
        <button class="player-controls-skip">
          <i class="fa-solid fa-forward"></i>
        </button>
      </div>

      <!-- Actions -->
      <div class="player-actions">
        <button class="player-action-btn">
          <i class="fa-regular fa-heart"></i>
          <span>Favori</span>
        </button>
        <button class="player-action-btn player-action-btn--active">
          <i class="fa-solid fa-arrow-down"></i>
          <span>Offline</span>
        </button>
        <button class="player-action-btn">
          <i class="fa-solid fa-share-from-square"></i>
          <span>Partager</span>
        </button>
      </div>

    </div>

  </div>

</body>
</html>
