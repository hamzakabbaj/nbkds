<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mot de passe oublié — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <!-- Nav Header -->
    <div class="nav-header">
      <a href="13_login.html" class="nav-header-back">
        <i class="fa-solid fa-chevron-left"></i>
      </a>
      <h1 class="nav-header-title"></h1>
    </div>

    <div class="onboarding-screen" style="padding-top: 0;">

      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 var(--space-5);">

        <!-- Icon -->
        <div style="text-align: center; margin-bottom: var(--space-8);">
          <div class="auth-icon">
            <i class="fa-solid fa-key"></i>
          </div>
        </div>

        <h1 class="auth-title" style="text-align: center;">Mot de passe oublié ?</h1>
        <p class="auth-subtitle" style="text-align: center; max-width: 280px; margin: 0 auto var(--space-8);">
          Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.
        </p>

        <div class="auth-form">
          <div class="auth-field">
            <label class="auth-label">Adresse email</label>
            <div class="auth-input-wrapper">
              <i class="fa-solid fa-envelope auth-input-icon"></i>
              <input class="auth-input" type="email" placeholder="samia@example.com">
            </div>
          </div>
        </div>

        <a href="15_email_sent.html" class="onboarding-btn" style="text-decoration: none; display: block; margin-top: var(--space-5);">Envoyer le lien</a>
      </div>

    </div>
  </div>

</body>
</html>
