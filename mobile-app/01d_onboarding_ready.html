<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding 4 — Tout est prêt — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:42</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <div class="onboarding-screen">
      <div class="onboarding-dots">
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot onboarding-dot--active"></span>
      </div>

      <div class="onboarding-content">
        <div class="onboarding-icon onboarding-icon--success">
          <i class="fa-solid fa-check"></i>
        </div>
        <h1 class="onboarding-title">Tout est prêt !</h1>
        <p class="onboarding-subtitle">
          3 contenus téléchargés pour Yassine et Nora.
          Lancez un conte et laissez la magie de la darija faire le reste.
        </p>
      </div>

      <div class="onboarding-footer">
        <a href="02_home.html" class="onboarding-btn" style="text-decoration: none; display: block;">Découvrir le catalogue</a>
      </div>
    </div>
  </div>

</body>
</html>
