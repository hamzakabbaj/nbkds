<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email envoyé — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <div class="onboarding-screen">

      <div class="onboarding-content">
        <div class="onboarding-icon onboarding-icon--success">
          <i class="fa-solid fa-paper-plane"></i>
        </div>
        <h1 class="onboarding-title">Vérifiez votre boîte mail</h1>
        <p class="onboarding-subtitle">
          Nous avons envoyé un lien de réinitialisation à votre adresse email.
          Vérifiez aussi vos spams si vous ne le trouvez pas.
        </p>
      </div>

      <div class="onboarding-footer">
        <a href="13_login.html" class="onboarding-btn" style="text-decoration: none; display: block;">Retour à la connexion</a>
        <p class="auth-resend-text">
          Pas reçu ? <span class="auth-resend-link">Renvoyer l'email</span>
        </p>
      </div>

    </div>
  </div>

</body>
</html>
