<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changer le mot de passe — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <!-- Nav Header -->
    <div class="nav-header">
      <a href="16_edit_account.html" class="nav-header-back">
        <i class="fa-solid fa-chevron-left"></i>
      </a>
      <h1 class="nav-header-title">Mot de passe</h1>
    </div>

    <div class="screen" style="padding: var(--space-5);">

      <p class="auth-subtitle" style="margin-bottom: var(--space-6);">
        Choisissez un nouveau mot de passe d'au moins 8 caractères.
      </p>

      <div class="sheet-form" style="padding-top: 0;">

        <div class="sheet-field">
          <label class="sheet-label">Mot de passe actuel</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-lock auth-input-icon"></i>
            <input class="auth-input" type="password" placeholder="••••••••" value="••••••••">
            <i class="fa-solid fa-eye auth-input-toggle"></i>
          </div>
        </div>

        <div class="sheet-field">
          <label class="sheet-label">Nouveau mot de passe</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-lock auth-input-icon"></i>
            <input class="auth-input" type="password" placeholder="Au moins 8 caractères">
            <i class="fa-solid fa-eye auth-input-toggle"></i>
          </div>
        </div>

        <div class="sheet-field">
          <label class="sheet-label">Confirmer le nouveau mot de passe</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-lock auth-input-icon"></i>
            <input class="auth-input" type="password" placeholder="Retapez le mot de passe">
            <i class="fa-solid fa-eye auth-input-toggle"></i>
          </div>
        </div>

      </div>

      <a href="07_profile.html" class="onboarding-btn" style="text-decoration: none; display: block; margin-top: var(--space-4);">Mettre à jour</a>

    </div>
  </div>

</body>
</html>
