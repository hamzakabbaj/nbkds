<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <div class="onboarding-screen">

      <!-- Logo -->
      <div class="onboarding-content" style="justify-content: flex-start; padding-top: 48px; flex: 0;">
        <p class="logo-bismillah">بسم الله الرحمن الرحيم</p>
        <p class="logo">N<span>OO</span>BA</p>
      </div>

      <!-- Login Form -->
      <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 var(--space-5);">
        <h1 class="auth-title">Se connecter</h1>
        <p class="auth-subtitle">Accédez au catalogue audio pour vos enfants.</p>

        <div class="auth-form">
          <div class="auth-field">
            <label class="auth-label">Adresse email</label>
            <div class="auth-input-wrapper">
              <i class="fa-solid fa-envelope auth-input-icon"></i>
              <input class="auth-input" type="email" placeholder="samia@example.com" value="samia.elmasri@gmail.com">
            </div>
          </div>

          <div class="auth-field">
            <label class="auth-label">Mot de passe</label>
            <div class="auth-input-wrapper">
              <i class="fa-solid fa-lock auth-input-icon"></i>
              <input class="auth-input" type="password" placeholder="••••••••" value="••••••••">
              <i class="fa-solid fa-eye auth-input-toggle"></i>
            </div>
          </div>

          <a href="14_forgot_password.html" class="auth-forgot-link">Mot de passe oublié ?</a>
        </div>

        <a href="01b_onboarding_children.html" class="onboarding-btn" style="text-decoration: none; display: block; margin-top: var(--space-5);">Se connecter</a>
      </div>

      <!-- Footer -->
      <div style="padding: 0 var(--space-5) var(--space-8); text-align: center;">
        <p class="auth-no-account">
          Pas encore de compte ?<br>
          Abonnez-vous sur <strong>nooba.ma</strong>
        </p>
      </div>

    </div>
  </div>

</body>
</html>
