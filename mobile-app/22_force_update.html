<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mise à jour requise — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <div class="onboarding-screen">

      <div class="onboarding-content">
        <div class="blocking-icon blocking-icon--accent">
          <i class="fa-solid fa-arrow-up-from-bracket"></i>
        </div>
        <h1 class="onboarding-title">Mise à jour disponible</h1>
        <p class="onboarding-subtitle">
          Une nouvelle version de Nooba est nécessaire
          pour continuer à utiliser l'application.
          Cette mise à jour apporte des améliorations
          importantes et de nouveaux contenus.
        </p>

        <div class="update-version-info">
          <div class="update-version-row">
            <span class="update-version-label">Version actuelle</span>
            <span class="update-version-value">1.0.0</span>
          </div>
          <div class="update-version-row">
            <span class="update-version-label">Version requise</span>
            <span class="update-version-value" style="color: var(--accent);">1.2.0</span>
          </div>
        </div>
      </div>

      <div class="onboarding-footer">
        <a href="#" class="onboarding-btn" style="text-decoration: none; display: block;">
          <i class="fa-brands fa-apple" style="margin-right: 8px;"></i>
          Mettre à jour
        </a>
        <p style="text-align: center; font-size: 12px; color: var(--text-disabled); margin-top: var(--space-3);">
          Vous serez redirigé vers l'App Store
        </p>
      </div>

    </div>
  </div>

</body>
</html>
