<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding 2 — Profils enfants — NOOBA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="phone">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="status-bar-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </div>

    <div class="onboarding-screen">
      <div class="onboarding-dots">
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot onboarding-dot--active"></span>
        <span class="onboarding-dot"></span>
        <span class="onboarding-dot"></span>
      </div>

      <div class="onboarding-content" style="justify-content: flex-start; padding-top: 32px;">
        <h1 class="onboarding-title">Qui va écouter ?</h1>
        <p class="onboarding-subtitle" style="margin-bottom: 32px;">
          Ajoutez vos enfants pour personnaliser le catalogue par âge.
        </p>

        <div class="onboarding-form">
          <div class="onboarding-child-row">
            <input class="onboarding-input" type="text" placeholder="Prénom" value="Yassine">
            <input class="onboarding-input" type="text" placeholder="Âge" value="7 ans">
          </div>
          <div class="onboarding-child-row">
            <input class="onboarding-input" type="text" placeholder="Prénom" value="Nora">
            <input class="onboarding-input" type="text" placeholder="Âge" value="4 ans">
          </div>
          <button class="onboarding-add-child">
            <i class="fa-solid fa-plus"></i> Ajouter un enfant
          </button>
        </div>
      </div>

      <div class="onboarding-footer">
        <a href="01c_onboarding_reco.html" class="onboarding-btn" style="text-decoration: none; display: block;">Suivant</a>
        <a href="01c_onboarding_reco.html" class="onboarding-skip" style="text-decoration: none; display: block;">Passer cette étape</a>
      </div>
    </div>
  </div>

</body>
</html>
